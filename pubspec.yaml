name: proxly
description: "Clash proxy monitor and control panel."
publish_to: 'none'

version: 26.2.3+22

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  open_file: ^3.3.2
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  flutter_inappwebview: ^6.0.0
  dartssh2: ^2.9.0
  flutter_svg: ^2.0.0
  path_provider: ^2.1.0
  archive: ^3.6.1
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/web_panel/
    - assets/web_panel/assets/
    - assets/web_panel/fonts/
    - assets/web_panel/images/
    - assets/icons/
